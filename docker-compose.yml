version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: resumeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resumeai
      POSTGRES_USER: resumeai
      POSTGRES_PASSWORD: resumeai_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U resumeai']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resumeai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
