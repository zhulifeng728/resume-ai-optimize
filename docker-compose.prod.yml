version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: resumeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumeai}
      POSTGRES_USER: ${POSTGRES_USER:-resumeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumeai_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-resumeai}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumeai

  redis:
    image: redis:7-alpine
    container_name: resumeai-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumeai

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: resumeai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resumeai}:${POSTGRES_PASSWORD:-resumeai_prod}@postgres:5432/${POSTGRES_DB:-resumeai}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/packages/backend/uploads
    networks:
      - resumeai

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: resumeai-frontend
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    depends_on:
      - backend
    networks:
      - resumeai

volumes:
  pgdata:
  redisdata:
  uploads:

networks:
  resumeai:
    driver: bridge
